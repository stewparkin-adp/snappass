name: Custom Domain Setup

on:
  workflow_dispatch:
    inputs:
      custom_domain:
        description: 'Custom domain to bind (e.g. secrets.assured-dp.com)'
        required: true
        type: string
      dns_confirmed:
        description: 'Have you added the DNS records in Cloudflare? (set true to provision cert)'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION:       ${{ vars.AZURE_LOCATION || 'uksouth' }}
  PWPUSH_BASE_NAME:     ${{ vars.PWPUSH_BASE_NAME || 'pwpush' }}

jobs:
  # ------------------------------------------------------------------
  # Phase 1 — output the DNS records required in Cloudflare
  # Always runs so you can re-check the values at any time
  # ------------------------------------------------------------------
  dns-records:
    name: Show required DNS records
    runs-on: ubuntu-latest
    outputs:
      verification_id: ${{ steps.env-info.outputs.verification_id }}
      app_fqdn:        ${{ steps.env-info.outputs.app_fqdn }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get environment info
        id: env-info
        run: |
          VERIFICATION_ID=$(az containerapp env show \
            --name "${PWPUSH_BASE_NAME}-env" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.customDomainVerificationId -o tsv)

          APP_FQDN=$(az containerapp show \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "verification_id=$VERIFICATION_ID" >> "$GITHUB_OUTPUT"
          echo "app_fqdn=$APP_FQDN"               >> "$GITHUB_OUTPUT"

      - name: Print DNS records
        run: |
          DOMAIN="${{ inputs.custom_domain }}"
          # Extract subdomain label (e.g. "secrets" from "secrets.assured-dp.com")
          LABEL="${DOMAIN%%.*}"

          echo "## DNS records to add in Cloudflare" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Add these two records to your zone in Cloudflare:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | Name | Value | Proxy |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`TXT\` | \`asuid.${LABEL}\` | \`${{ steps.env-info.outputs.verification_id }}\` | DNS only (grey cloud) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`CNAME\` | \`${LABEL}\` | \`${{ steps.env-info.outputs.app_fqdn }}\` | DNS only (grey cloud) ⚠️ |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ **Cloudflare CNAME must be set to DNS-only (grey cloud) during cert provisioning.**" >> "$GITHUB_STEP_SUMMARY"
          echo "> Once the certificate is active you can re-enable the Cloudflare proxy (orange cloud)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Once DNS has propagated, re-run this workflow with **dns_confirmed = true** to provision the certificate." >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # Phase 2 — provision the managed cert and bind the domain
  # Only runs when dns_confirmed is true
  # ------------------------------------------------------------------
  bind-domain:
    name: Provision cert and bind domain
    runs-on: ubuntu-latest
    needs: dns-records
    if: ${{ inputs.dns_confirmed == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step 1: Register the hostname on the Container App (no cert yet)
      # This is required before Azure will provision a managed certificate
      - name: Add hostname to Container App
        run: |
          az containerapp hostname add \
            --hostname "${{ inputs.custom_domain }}" \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP"

      # Step 2: Provision free managed TLS cert and bind it in one command.
      # Azure validates ownership via the CNAME record, then issues the cert.
      # This can take a few minutes.
      - name: Bind managed certificate
        run: |
          az containerapp hostname bind \
            --hostname "${{ inputs.custom_domain }}" \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --environment "${PWPUSH_BASE_NAME}-env" \
            --validation-method CNAME

      - name: Summary
        run: |
          echo "### Custom domain bound" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** https://${{ inputs.custom_domain }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "You can now re-enable the Cloudflare proxy (orange cloud) on the CNAME record." >> "$GITHUB_STEP_SUMMARY"
