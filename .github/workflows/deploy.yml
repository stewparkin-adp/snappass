name: Deploy PWPush

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'Dockerfile'
      - 'deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region (overrides variable)'
        required: false
        type: string
      base_name:
        description: 'Base name for resources (overrides variable)'
        required: false
        type: string

# Required for OIDC token exchange with Azure
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION:       ${{ inputs.location  || vars.AZURE_LOCATION  || 'uksouth' }}
  PWPUSH_BASE_NAME:     ${{ inputs.base_name || vars.PWPUSH_BASE_NAME || 'pwpush' }}

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Azure login via OIDC (no long-lived credentials stored anywhere)
      # ------------------------------------------------------------------
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      # ------------------------------------------------------------------
      # Create the resource group if it doesn't already exist
      # ------------------------------------------------------------------
      - name: Create resource group
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none
          echo "Resource group: $AZURE_RESOURCE_GROUP"

      # ------------------------------------------------------------------
      # Deploy Bicep — ACR, Managed Identity, Container App
      # ------------------------------------------------------------------
      - name: Deploy Bicep
        id: bicep
        env:
          PWP_SECRET_KEY_BASE: ${{ secrets.PWP_SECRET_KEY_BASE }}
          PWP_MASTER_KEY:      ${{ secrets.PWP_MASTER_KEY }}
        run: |
          OUTPUT=$(az deployment group create \
            --name "pwpush-$(date +%Y%m%d%H%M%S)" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters baseName="$PWPUSH_BASE_NAME" location="$AZURE_LOCATION" \
            --output json)

          ACR_NAME=$(echo "$OUTPUT"         | python3 -c "import sys,json; print(json.load(sys.stdin)['properties']['outputs']['acrName']['value'])")
          ACR_LOGIN_SERVER=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['properties']['outputs']['acrLoginServer']['value'])")
          APP_URL=$(echo "$OUTPUT"          | python3 -c "import sys,json; print(json.load(sys.stdin)['properties']['outputs']['pwpushUrl']['value'])")

          echo "acr_name=$ACR_NAME"                 >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL"                   >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Build the PWPush image in ACR from our Dockerfile
      # (ACR's build service pulls from Docker Hub — no auth needed)
      # ------------------------------------------------------------------
      - name: Build image in ACR
        run: |
          az acr build \
            --registry "${{ steps.bicep.outputs.acr_name }}" \
            --image "pwpush:latest" \
            --file Dockerfile \
            .

      # ------------------------------------------------------------------
      # Update the Container App to use the ACR-hosted image
      # ------------------------------------------------------------------
      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.bicep.outputs.acr_login_server }}/pwpush:latest" \
            --output none

      # ------------------------------------------------------------------
      # Re-bind custom domain after every deploy.
      # Bicep resets ingress config and drops the custom domain binding,
      # so we restore it here if CUSTOM_DOMAIN variable is set.
      # ------------------------------------------------------------------
      - name: Restore custom domain binding
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          echo "Restoring custom domain: $CUSTOM_DOMAIN"

          az containerapp hostname add \
            --hostname "$CUSTOM_DOMAIN" \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" 2>/dev/null || true

          az containerapp hostname bind \
            --hostname "$CUSTOM_DOMAIN" \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --environment "${PWPUSH_BASE_NAME}-env" \
            --validation-method CNAME

      - name: Print URL
        run: |
          DOMAIN="${{ vars.CUSTOM_DOMAIN }}"
          URL="${DOMAIN:+https://$DOMAIN}"
          URL="${URL:-${{ steps.bicep.outputs.app_url }}}"
          echo "### PWPush deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** ${{ steps.bicep.outputs.acr_login_server }}/pwpush:latest" >> "$GITHUB_STEP_SUMMARY"
