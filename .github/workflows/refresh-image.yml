name: Refresh PWPush Image

on:
  schedule:
    # Check for a new upstream image every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'PWPush image tag to pull (default: latest)'
        required: false
        default: 'latest'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  PWPUSH_BASE_NAME:     ${{ vars.PWPUSH_BASE_NAME || 'pwpush' }}
  IMAGE_TAG:            ${{ inputs.image_tag || 'latest' }}

jobs:
  refresh:
    name: Re-import image and redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resolve the ACR name from the existing Container App configuration
      - name: Get ACR login server
        id: acr
        run: |
          IMAGE=$(az containerapp show \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.template.containers[0].image" \
            --output tsv)

          ACR_LOGIN_SERVER="${IMAGE%%/*}"
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"

          echo "login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "acr_name=$ACR_NAME"             >> "$GITHUB_OUTPUT"

      # Import latest PWPush image from Docker Hub into ACR
      - name: Import PWPush image into ACR
        run: |
          az acr import \
            --name "${{ steps.acr.outputs.acr_name }}" \
            --source "docker.io/psilocybin/pwpush:$IMAGE_TAG" \
            --image "pwpush:$IMAGE_TAG" \
            --force

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${PWPUSH_BASE_NAME}-app" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.acr.outputs.login_server }}/pwpush:$IMAGE_TAG" \
            --output none

      - name: Summary
        run: |
          echo "### Image refreshed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** ${{ steps.acr.outputs.login_server }}/pwpush:${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
