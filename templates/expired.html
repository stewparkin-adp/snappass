{% extends "base.html" %}

{% block content %}
<div class="adp-hero adp-hero-sm">
  <div class="container">
    <h1 class="adp-hero-title">Secret Not Found</h1>
  </div>
</div>

<div class="container adp-main">
  <div class="row">
    <div class="col-sm-6 col-sm-offset-3">
      <div class="adp-card adp-card-centered">
        <div class="adp-card-body text-center">
          <i class="fa fa-ban adp-expired-icon"></i>
          <p class="lead">This secret does not exist or has already been viewed.</p>
          <p>Secrets are one-time use and permanently deleted after viewing. If you expected a secret here, please ask the sender to generate a new link.</p>
          <a href="/" class="btn adp-btn-primary">
            <i class="fa fa-plus"></i> Create a New Secret
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
